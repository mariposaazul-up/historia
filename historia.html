<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style> 

/* RESET mínimo */
body{
  margin:0;
  padding:0;
  background:#0f1115;
display:flex;
  justify-content:center;
  align-items:center;
  height:100vh; /* 👈 clave */
  overflow:hidden; /* 👈 corta todo lo extra */
}

/* CONTENEDOR */
.galeria{
  display:flex;
  flex-direction:row;
  gap:0;
scroll-behavior:smooth; 
  scroll-padding:0 50%;
  overflow-x:auto;
  scroll-snap-type:x mandatory;

  width:100%;
  padding:40px 0;

  scroll-padding-left: calc(50% - 117.5px);
  scroll-padding-right: calc(50% - 117.5px);
}

.galeria::-webkit-scrollbar{
  display:none;
}

/* CADA IMAGEN */
.img-wrap{
  flex:0 0 auto;

  width:235px;
  max-width:1440px; /* 🔥 límite real */

  aspect-ratio:5/7; /* 🔥 proporción correcta */
  scroll-snap-align:center;

  overflow:hidden;
}

/* IMAGEN */
.img-wrap img{
  width:100%;
  height:100%;
  object-fit:contain;
}


  
</style>
</head>

<body>

<div class="galeria">

  <div class="img-wrap">
    <img src="11.jpeg">
  </div>

  <div class="img-wrap">
    <img src="22.jpeg">
  </div>

  <div class="img-wrap">
    <img src="33.jpeg">
  </div>

  <div class="img-wrap">
    <img src="44.jpeg">
  </div>

  <div class="img-wrap">
    <img src="55.jpeg">
  </div>

  <div class="img-wrap">
    <img src="66.jpeg">
  </div>

  <div class="img-wrap">
    <img src="77.jpeg">
  </div>

  <div class="img-wrap">
    <img src="88.jpeg">
  </div>

</div>

</body>
</html>
